// fx.cfg     hardware config file for the F/X Player
//            (c) 1998 by Beo of Stigma
//
//   Here are the default values for the different output devices.
//   Change the values in the section of the appropriate Device.
//
//   The style of this file is very much like the weird old
//   Win$lowz .ini files.
//
//   The official page for the F/X Player is at
//     http://home.pages.de/~fx/
//   You can get the latest development version of the F/X Player at
//     http://home.pages.de/~apollo/
//

// This is for correct init and version check

[System]
Version=0.50
Release=alpha

// ###### Output Device definitions ######
//
// The following Devices look all like this:
//
// [Device]
// Name=sb16                 ; referenz name for fx.ini file
// Type=SB                   ; what type of soundcard
// Title="Sound Blaster 16"  ; Full name for display
// Address=220               ; Device address in hex value
// Irq=5                     ; Device irq in decimal value
// DmaLo=1                   ; Device 1st (8bit) dma in decimal value
// DmaHi=5                   ; Device 2nd (16bit) dma in decimal value
// Mode=16s,16m,8s,8m        ; Output in 16/8 bit and mono/stereo
// Speed=44100               ; Output rate in Hz
//

[Device]
Name=none                    # used for correct timing with no sound card :-)
Type=SERIAL
Tilte="No Sound (serial)"
Address=278                  # Com2
Irq=3
DmaLo=
DmaHi=
Mode=8m
Speed=9600

// Soundblaster types

[Device]
Name=sb2.0
Type=SB
Title="Sound Blaster & Compatible 8Bit"
Address=220
Irq=5
DmaLo=1
DmaHi=-1
Mode=8m
Speed=44100

[Device]
Name=sbpro
Type=SB
Title="Sound Blaster pro & Compatible"
Address=220
Irq=5
DmaLo=1
DmaHi=
Mode=8s,8m
Speed=44100

[Device]
Name=sb16
Type=SB
Title="Sound Blaster 16 & Compatible 16Bit"
Address=220
Irq=5
DmaLo=1
DmaHi=5                   # Some SB16 don't have 16Bit DMA: use DMALo instead
Mode=16s,16m,8s,8m
Speed=44100

// Gravis Ultrasound types

[Device]
Name=gus
Type=GUS
Title="Gravis Ultra Sound"
Address=220
Irq=5
DmaLo=1
DmaHi=5
Mode=16s,8s
Speed=44100

[Device]
Name=gusmax
Type=GUS
Title="Gravis Ultra Sound Max"
Address=220
Irq=5
DmaLo=1
DmaHi=5
Mode=16s
Speed=44100

// Windows Sound System

[Device]
Name=wss
Type=WSS
Title="Windows Sound System"
Address=534
Irq=5
DmaLo=1
DmaHi=1
Mode=16s,16m
Speed=44100

// silence player

[Device]
Name=null                         # uses internal Timer 0
Type=TIMER
Title="No sound (to /dev/nul)"    # better use 'none'
Address=
Irq=0
DmaLo=
DmaHi=
Mode=8m
Speed=9600

// Hard Disk recording

[Device]
Name=wav
Type=WAV
Title="WAV Disk writer"
Address=
Irq=
DmaLo=
DmaHi=
Mode=16s
Speed=44100

[Device]
Name=mp3
Type=MP3
Title="MPEG Layer III encoder"
Address=
Irq=
DmaLo=
DmaHi=
Mode=16s
Speed=44100

// ###### End of Output Devices definition


// ###### Interpolation definitions ######

[Interpolation]

//  Use Interpolation
//
//  values are: 0/off = OFF
//              1/on  = 1. grade
//              2     = 2. grade (not implemented yet)

Interpolation=on

//  PreCalc converts all Samples while loading to higher Quality Samples
//  Also sets the multiplier of samplesize, maximum is 8
//  0/off means don't use
//  (not implemented yet)

PreCalc=2

// ###### End of Interpolation definitions


// ###### Predefined Delays #######
//  (not available)
//  RingXparm = Delay_time[ms],Volume[%],Panning[%]
//  RingXfilt = LowPass[Hz], HiPass[Hz]

[Delay]
Name="Subtle Room"
Ring1parm=2,26,52
Ring1filt=
Ring2parm=8,19,37
Ring2filt=1400,15000
Ring3parm=14,14,65
Ring3filt=800,6000
Ring4parm=20,8,46
Ring4filt=2000,5000

[Delay]
Name="Big Hall"
Ring1parm=10,26,38
Ring1filt=1400,15000
Ring2parm=15,20,67
Ring2filt=3400,8000
Ring3parm=22,14,65
Ring3filt=1500,8000
Ring4parm=35,8,46
Ring4filt=4000,6500

[Delay]
Name="Surround"
Ring1parm=3,15,40
Ring1filt=1400,15000
Ring2parm=5,5,80
Ring2filt=3400,8000
Ring3parm=7,4,22
Ring3filt=1500,8000
Ring4parm=
Ring4filt=

[Delay]
Name="Beo's Wunder Delay"
Ring1parm=10,26,50
Ring1filt=200,2000
Ring2parm=8,7,65
Ring2filt=3400,8000
Ring3parm=12,4,45
Ring3filt=1500,8000
Ring4parm=15,2,60
Ring4filt=4000,6500

// ###### End Delay definitions

// End of fx.cfg
