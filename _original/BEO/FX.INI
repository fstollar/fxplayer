//****************** Inifile for the F/X Player v0.41 **********************
//****  you can get the latest version of the F/X Player somewhere at:  ****
// ---> http://www.home.pages.de/~jakob

// to skip one pattern use the cursor-keys
// to exit, use ESC ot ALT+X
// For DOS-Shell use ALT+S
// For PAUSE press TAB

[Soundcard]
Cardtype=SB
Adress=220
IRQ=5
DMA=5
MixingSpeed=45454

// values: Mono, Stereo, WideMono (following soon: WideStereo, Auto)
// Stereo <-> WideMono toggle: ALT-M
StereoMode=Stereo

// values: 0/off = OFF, 1/on = 1. grade (coming up: 2. grade)
// experimental: use at your own risk! toggle with ALT-I
Interpolation=off

// precalucation of samples (will need more memory) but the
// quality will be better like quantisazion
// !! NOT IMPLEMENTED YET !!!
Precalc=off

[FX-Player]
// Directory where you have your modules
StartUpDirectory=E:\sound\s3m
